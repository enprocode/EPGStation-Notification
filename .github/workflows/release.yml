name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION file is empty"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$VERSION" != "$TAG" ]; then
              echo "VERSION ($VERSION) does not match tag ($TAG)"
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o epgst-notify main.go

      - name: Package
        run: |
          mkdir -p dist/epgst-notify
          mv epgst-notify dist/epgst-notify/
          cp bin/config.yml dist/epgst-notify/
          cd dist && zip -r "../epgst-notify-v${{ steps.version.outputs.version }}-linux-amd64.zip" epgst-notify/
          cd ..
          sha256sum "epgst-notify-v${{ steps.version.outputs.version }}-linux-amd64.zip" > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            epgst-notify-v${{ steps.version.outputs.version }}-linux-amd64.zip
            checksums.txt
